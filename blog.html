<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTG Blog Comparison</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<section class="comparison-section">

    <div class="comparison-header">
        <div class="divider">---</div>
        <h2>Why GTG is the #1 Choice</h2>
    </div>
    
    <div class="comparison-table">
    
        <!-- HEADER ROW -->
        <div class="table-row table-header">
    
            <div class="col qualities">Qualities</div>
    
            <div class="col product highlight">
                <div class="product-img product-gtg"></div>
                <p>GTG</p>
            </div>
    
            <div class="col product">
                <div class="product-img product-arose"></div>
                <p>Arose</p>
            </div>
    
            <div class="col product">
                <div class="product-img product-bella"></div>
                <p>Bella</p>
            </div>
    
            <div class="col product">
                <div class="product-img product-daisies"></div>
                <p>Daisies</p>
            </div>
    
        </div>
    
    
        <!-- ROWS -->
    
        <div class="table-row">
            <div class="col qualities">Potency Concentration</div>
            <div class="col highlight">10x</div>
            <div class="col">1x</div>
            <div class="col">1x</div>
            <div class="col">10x</div>
        </div>
    
        <div class="table-row">
            <div class="col qualities">Longevity</div>
            <div class="col highlight"><div class="circle"></div></div>
            <div class="col"><div class="circle"></div></div>
            <div class="col"><div class="circle"></div></div>
            <div class="col"><div class="circle"></div></div>
        </div>
    
        <div class="table-row">
            <div class="col qualities">Sillage</div>
            <div class="col highlight"><div class="circle"></div></div>
            <div class="col"><div class="circle"></div></div>
            <div class="col"><div class="circle"></div></div>
            <div class="col"><div class="circle"></div></div>
        </div>
    
        <div class="table-row">
            <div class="col qualities">Bottle Design Score</div>
            <div class="col highlight">9</div>
            <div class="col">5</div>
            <div class="col">6</div>
            <div class="col">2</div>
        </div>
    
        <div class="table-row">
            <div class="col qualities">Blend and Harmony</div>
            <div class="col highlight"><div class="circle"></div></div>
            <div class="col"><div class="circle"></div></div>
            <div class="col"><div class="circle"></div></div>
            <div class="col"><div class="circle"></div></div>
        </div>
    
        <div class="table-row">
            <div class="col qualities">Skin Compatibility</div>
            <div class="col highlight"><div class="circle"></div></div>
            <div class="col"><div class="circle"></div></div>
            <div class="col"><div class="circle"></div></div>
            <div class="col"><div class="circle"></div></div>
        </div>
    
        <div class="table-row">
            <div class="col qualities">Scent Profile</div>
            <div class="col highlight"><div class="circle"></div></div>
            <div class="col"><div class="circle"></div></div>
            <div class="col"><div class="circle"></div></div>
            <div class="col"><div class="circle"></div></div>
        </div>
    
        <div class="table-row">
            <div class="col qualities">Price vs. Quality</div>
            <div class="col highlight"><div class="circle"></div></div>
            <div class="col"><div class="circle"></div></div>
            <div class="col"><div class="circle"></div></div>
            <div class="col"><div class="circle"></div></div>
        </div>
    
    </div>
    
    <div class="comparison-btn">
        <button class="try-btn">Try It Risk-Free</button>
    </div>
    
</section>

</html>
